# Default in-container configuration.
# Mount your library read-only at /comics and a persistent volume at /data.
# To change these, mount your own file over /etc/tefnut/config.yaml.
# The disk budgets below can also be overridden per-container via env vars
# (accepting raw bytes or 512MiB/2GiB-style values; 0 disables the cap):
#   TEFNUT_CACHE_MAX_BYTES       -> cache.maxBytes
#   TEFNUT_THUMB_PAGES_MAX_BYTES -> thumbnail.pagesMaxBytes
library:
  rootPath: /comics
dataDir: /data
server:
  addr: ":8086"
thumbnail:
  width: 400
  pageWidth: 120
  pagesMaxBytes: 536870912  # 512 MiB budget for page thumbnails (<=0 disables)
cache:
  maxBytes: 2147483648  # 2 GiB
