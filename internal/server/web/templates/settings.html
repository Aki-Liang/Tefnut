{{define "title"}}设置 · Tefnut{{end}}
{{define "content"}}
<h1>设置</h1>

<section class="card-box">
  <h2>漫画库路径</h2>
  <ul id="paths">
    {{range .LibraryPaths}}
    <li data-id="{{.ID}}"><span class="lib-name">{{.Name}}</span><span class="lib-path">{{.Path}}</span><button class="del">删除</button></li>
    {{end}}
  </ul>
  <form id="addpath" class="row">
    <input id="np-path" placeholder="库目录绝对路径，如 /Users/me/comic" autocomplete="off">
    <input id="np-name" placeholder="显示名（默认取末段）" autocomplete="off">
    <button>添加</button>
  </form>
</section>

<section class="card-box">
  <div class="card-head">
    <h2>扫描方式</h2>
    <button type="submit" form="scanform">保存</button>
  </div>
  <form id="scanform" class="scanform">
    <div class="mode-row">
      <label><input type="radio" name="mode" value="interval"> 定时间隔</label>
      <span class="mode-args" data-mode="interval">
        <input id="iv" placeholder="如 30m" autocomplete="off">
        <small class="hint">格式：如 30m、2h、90m；单位 s/m/h</small>
      </span>
    </div>
    <div class="mode-row">
      <label><input type="radio" name="mode" value="daily"> 每日定时</label>
      <span class="mode-args" data-mode="daily">
        <select id="daily-h"></select> 时
        <select id="daily-m"></select> 分
      </span>
    </div>
    <div class="mode-row">
      <label><input type="radio" name="mode" value="watch"> 监控路径（文件变化即扫描）</label>
    </div>
  </form>
  <div class="scan-now-row">
    <button type="button" id="scan-now" class="card-box-btn">立即扫描</button>
    <span id="scan-now-status" class="hint"></span>
  </div>
</section>

<section class="card-box">
  <div class="card-head">
    <h2>缓存</h2>
    <button type="submit" form="cacheform">保存</button>
  </div>
  <form id="cacheform" class="scanform">
    <div class="budget-row">
      <label for="cache-max">解压缓存上限</label>
      <input id="cache-max" type="number" min="0" step="1" autocomplete="off">
      <select id="cache-max-unit" title="单位">
        <option value="1048576">MiB</option>
        <option value="1073741824">GiB</option>
      </select>
    </div>
    <div class="budget-row">
      <label for="pthumb-max">页缩略图上限</label>
      <input id="pthumb-max" type="number" min="0" step="1" autocomplete="off">
      <select id="pthumb-max-unit" title="单位">
        <option value="1048576">MiB</option>
        <option value="1073741824">GiB</option>
      </select>
    </div>
    <small class="hint">0 = 不限制。超限时在每次扫描结束后按最旧优先整本清理。</small>
  </form>
  <div class="cache-clear-row">
    <button type="button" id="cache-clear" class="card-box-btn danger">立即清理</button>
    <span id="cache-clear-status" class="hint"></span>
  </div>
</section>

<div id="scan-data" data-mode="{{.ScanMode}}" data-interval="{{.ScanInterval}}" data-daily="{{.ScanDailyTime}}" hidden></div>
<div id="cache-data" data-cache-max="{{.CacheMaxBytes}}" data-pthumb-max="{{.ThumbPagesMaxBytes}}" hidden></div>
{{end}}
{{define "scripts"}}<script src="/static/js/settings.js"></script>{{end}}
