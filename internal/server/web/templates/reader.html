{{define "title"}}{{.Name}} · 阅读{{end}}
{{define "sidebar"}}{{- "" -}}{{end}}
{{define "mainclass"}}reader-main{{end}}
{{define "content"}}
<div id="reader" data-id="{{.ID}}" data-pages="{{.PageCount}}" data-start="{{.LastPage}}" data-dir="{{.ReadingDirection}}" data-mode="{{.DisplayMode}}">
  <div class="reader-stage"></div>
  <div class="reader-bar">
    <a class="back" href="/" id="backlink">← 返回</a>
    <button class="pagebtn" id="prevbtn">上一页</button>
    <span id="counter"></span>
    <button class="pagebtn" id="nextbtn">下一页</button>
    <button class="pagebtn" id="dirtoggle" title="翻页方向">方向: <span id="dirlabel">LTR</span></button>
      <select class="pagebtn" id="modetoggle" title="展示方式">
        <option value="single">单页</option>
        <option value="continuous">连续</option>
        <option value="spread">双页</option>
      </select>
      <button class="pagebtn" id="fittoggle" title="适配方式">适配: <span id="fitlabel">高</span></button>
      <span class="zoomgroup">
        <button class="pagebtn" id="zoomout" title="缩小" aria-label="缩小">−</button>
        <input id="zoominput" class="zoominput" inputmode="numeric" title="缩放百分比" value="100" aria-label="缩放百分比" autocomplete="off">
        <span class="zoompct">%</span>
        <button class="pagebtn" id="zoomin" title="放大" aria-label="放大">+</button>
      </span>
      <button class="pagebtn" id="stepbtn" title="翻页步进">步进: <span id="steplabel">两页</span></button>
  </div>
  <div id="thumbstrip" class="thumbstrip">
    <button id="stripToggle" class="strip-toggle" aria-label="收起/展开预览">•••</button>
    <div class="thumbs" id="thumbs"></div>
  </div>
</div>
{{end}}
{{define "scripts"}}<script type="module" src="/static/js/reader.js"></script>{{end}}
